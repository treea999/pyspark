apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-history
  namespace: spark
  labels:
    app.kubernetes.io/name: spark-history
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-history
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-history
    spec:
      serviceAccountName: spark-sa
      securityContext:
        fsGroup: 185
      initContainers:
        - name: init-spark-events-dir
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /opt/spark/spark-events
              chmod 775 /opt/spark/spark-events
          volumeMounts:
            - name: spark-events
              mountPath: /opt/spark/spark-events
      containers:
        - name: spark-history
          image: apache/spark:4.0.2
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
            - org.apache.spark.deploy.history.HistoryServer
          envFrom:
            - configMapRef:
                name: spark-config
          ports:
            - name: history-ui
              containerPort: 18080
          volumeMounts:
            - name: spark-events
              mountPath: /opt/spark/spark-events
          readinessProbe:
            httpGet:
              path: /
              port: 18080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 18080
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: spark-events
          persistentVolumeClaim:
            claimName: spark-events-pvc
