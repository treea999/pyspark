apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
  namespace: spark
  labels:
    app.kubernetes.io/name: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airflow
    spec:
      serviceAccountName: spark-sa
      securityContext:
        fsGroup: 50000

      initContainers:
        - name: install-java-tools
          image: debian:12-slim
          command:
            - /bin/bash
            - -c
            - |
              set -e

              if [ -x /tools/jvm/java-17-openjdk-amd64/bin/java ] && [ -x /tools/bin/ps ]; then
                echo "Java and procps already installed in airflow-tools-pvc"
                exit 0
              fi

              apt-get update
              apt-get install -y --no-install-recommends openjdk-17-jre-headless procps

              mkdir -p /tools/jvm /tools/bin

              cp -a /usr/lib/jvm/java-17-openjdk-amd64 /tools/jvm/
              cp /bin/ps /tools/bin/ps

              chmod -R 755 /tools

              echo "Java and procps installed"
          volumeMounts:
            - name: airflow-tools
              mountPath: /tools

      containers:
        - name: airflow
          image: apache/airflow:2.10.5-python3.11
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -e

              pip install --no-cache-dir \
                apache-airflow-providers-apache-spark==4.11.1 \
                pyspark==3.5.5

              export JAVA_HOME=/opt/tools/jvm/java-17-openjdk-amd64
              export PATH=/opt/tools/bin:${JAVA_HOME}/bin:${PATH}

              airflow standalone
          env:
            - name: JAVA_HOME
              value: /opt/tools/jvm/java-17-openjdk-amd64
            - name: PATH
              value: /opt/tools/bin:/opt/tools/jvm/java-17-openjdk-amd64/bin:/home/airflow/.local/bin:/usr/local/bin:/usr/bin:/bin
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
              value: "true"
            - name: AIRFLOW_UID
              value: "50000"
          ports:
            - containerPort: 8080
              name: airflow-ui
          volumeMounts:
            - name: airflow-logs
              mountPath: /opt/airflow/logs
            - name: spark-events
              mountPath: /opt/spark/spark-events
            - name: airflow-tools
              mountPath: /opt/tools
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi

      volumes:
        - name: airflow-logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
        - name: spark-events
          persistentVolumeClaim:
            claimName: spark-events-pvc
        - name: airflow-tools
          persistentVolumeClaim:
            claimName: airflow-tools-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: spark
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: airflow
  ports:
    - name: airflow-ui
      port: 8080
      targetPort: airflow-ui
