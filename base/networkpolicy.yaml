apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spark-allow-internal
  namespace: spark
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 7077
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 18080
  egress:
    - {}
