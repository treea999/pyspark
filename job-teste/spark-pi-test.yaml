apiVersion: batch/v1
kind: Job
metadata:
  name: spark-pi-test
  namespace: spark
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never

      containers:
        - name: spark-submit
          image: apache/spark:4.0.2

          command:
            - /bin/bash
            - -c
            - |
              /opt/spark/bin/spark-submit \
              --master spark://spark-master.spark.svc.cluster.local:7077 \
              --deploy-mode client \
              --class org.apache.spark.examples.SparkPi \
              --conf spark.eventLog.enabled=true \
              --conf spark.eventLog.dir=file:/opt/spark/spark-events \
              /opt/spark/examples/jars/spark-examples_2.13-4.0.2.jar \
              100

          volumeMounts:
            - name: spark-events
              mountPath: /opt/spark/spark-events

      volumes:
        - name: spark-events
          persistentVolumeClaim:
            claimName: spark-events-pvc
